# configuration parsing starts here
defaults:
  - experiment: exp_latent_dyn  # experiment yaml file name in configurations/experiment folder
  - dataset: real_aloha_dataset  # dataset yaml file name in configurations/dataset folder
  - algorithm: latent_world_model  # algorithm yaml file name in configurations/algorithm folder
  - cluster: null  # optional, cluster yaml file name in configurations/cluster folder. Leave null for local compute

debug: false  # global debug flag will be passed into configuration of experiment, dataset and algorithm

wandb:
  entity: charlesji  # wandb account name / organization name [set your wandb entity here]
  project: interactive_world_sim  # wandb project name; if not provided, defaults to root folder name
  mode: online  # set wandb logging to online, offline or dryrun

resume: null  # wandb run id to resume logging and loading checkpoint from
load: null  # wandb run id containing checkpoint or a path to a checkpoint file
